# Continuous integration: lint, security, multi-version tests, coverage gate,
# packaging validation, and smoke install. Coverage fail_under is in pyproject.toml
# ([tool.coverage.report]); ratchet per docs/COVERAGE_PLAN.md when present.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & bytecode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (check-only; no file writes)
        run: make lint

  security:
    name: Security (deps + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + audit tools
        run: |
          python -m pip install -U pip "setuptools>=78.1.1" wheel
          pip install -e ".[dev]"

      - name: pip-audit (installed environment)
        run: pip-audit --desc on

      - name: Bandit (application code)
        run: bandit -c pyproject.toml -r aidlc -q --severity-level medium --confidence-level medium

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev tools
        run: pip install -e ".[dev]"

      - name: Run tests with coverage (3.12 only)
        if: matrix.python-version == '3.12'
        run: pytest --cov=aidlc --cov-report=term --cov-report=xml

      - name: Run tests (no coverage)
        if: matrix.python-version != '3.12'
        run: pytest

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  build:
    name: Build & validate distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build + twine
        run: pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Twine check (metadata + readme)
        run: twine check --strict dist/*

      - name: Smoke-install wheel
        run: |
          pip install dist/*.whl
          aidlc --help
          python -c "import importlib.metadata as m; assert m.version('aidlc')"
